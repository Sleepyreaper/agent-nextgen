<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Sign In — NextGen Evaluation System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script nonce="{{ csp_nonce }}">
    tailwind.config = {
        theme: {
            extend: {
                colors: { emory: { 'dark-blue': '#012169', 'medium-blue': '#007DBA', 'gold': '#F2A900', 'dark': '#101820', 'gray': { 100: '#F2F2F0', 200: '#D0D0CE', 500: '#63666A' }, 'red': '#DA291C' }},
                fontFamily: { heading: ['"Crimson Pro"', 'serif'], body: ['"Open Sans"', 'sans-serif'] },
            }
        }
    }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/nextgen.css') }}">
</head>

<body class="h-full bg-emory-gray-100 font-body flex items-center justify-center">
    <!-- Subtle background decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
        <div class="absolute -top-40 -right-40 w-[600px] h-[600px] rounded-full bg-emory-dark-blue/[0.03]"></div>
        <div class="absolute -bottom-40 -left-40 w-[500px] h-[500px] rounded-full bg-emory-gold/[0.05]"></div>
    </div>

    <div class="relative w-full max-w-md px-4">
        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- Header -->
            <div class="bg-emory-dark-blue px-8 pt-8 pb-6 text-center">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-emory-gold mb-4">
                    <span class="text-emory-dark font-bold text-xl font-heading">NG</span>
                </div>
                <h1 class="text-white font-heading text-2xl font-bold">NextGen Evaluation</h1>
                <p class="text-white/60 text-sm mt-1">Emory Department of Human Genetics</p>
            </div>

            <!-- Form -->
            <div class="px-8 py-8">
                {% if error %}
                <div class="mb-5 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm font-medium">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" class="space-y-5">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div>
                        <label for="username" class="block text-sm font-semibold text-emory-dark mb-1.5">Username</label>
                        <input type="text" id="username" name="username" required autocomplete="username"
                               class="w-full px-4 py-2.5 rounded-lg border border-emory-gray-200 bg-emory-gray-100/50 text-emory-dark placeholder-emory-gray-500 text-sm
                                      focus:outline-none focus:ring-2 focus:ring-emory-medium-blue/40 focus:border-emory-medium-blue transition"
                               placeholder="Enter your username">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-semibold text-emory-dark mb-1.5">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                               class="w-full px-4 py-2.5 rounded-lg border border-emory-gray-200 bg-emory-gray-100/50 text-emory-dark placeholder-emory-gray-500 text-sm
                                      focus:outline-none focus:ring-2 focus:ring-emory-medium-blue/40 focus:border-emory-medium-blue transition"
                               placeholder="Enter your password">
                    </div>

                    <button type="submit"
                            class="w-full py-2.5 rounded-lg bg-emory-dark-blue text-white font-semibold text-sm
                                   hover:bg-[#001a54] focus:outline-none focus:ring-2 focus:ring-emory-medium-blue/50 focus:ring-offset-2
                                   transition duration-150">
                        Sign In
                    </button>
                </form>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-emory-gray-500 text-xs mt-6">
            © 2026 Emory University · Department of Human Genetics<br>
            <span class="text-emory-gray-300">v{{ app_version }}</span>
        </p>
    </div>
</body>
</html>
