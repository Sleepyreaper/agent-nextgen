<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - NextGen Application Evaluation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ink-navy: #0b1f36;
            --ink-slate: #49576a;
            --champagne: #c8a15a;
            --accent-teal: #0b7f8f;
            --pearl: #f4f6f8;
            --card-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            --soft-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
            --error-red: #c0392b;
        }
        body {
            font-family: 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif;
            background-color: var(--pearl);
            color: var(--ink-navy);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(11, 127, 143, 0.08), transparent 45%),
                radial-gradient(circle at 90% 0%, rgba(200, 161, 90, 0.08), transparent 40%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.9) 0%, rgba(244, 246, 248, 0.95) 45%, rgba(244, 246, 248, 1) 100%);
        }
        h1, h2, h3 {
            font-family: 'Fraunces', 'Georgia', serif;
            letter-spacing: -0.02em;
        }
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }
        .login-header {
            background: linear-gradient(120deg, #0b1f36 0%, #153a5c 60%, #0b7f8f 100%);
            color: white;
            padding: 2.25rem 2.5rem 1.75rem;
            border-radius: 18px 18px 0 0;
            border-bottom: 4px solid var(--champagne);
            text-align: center;
        }
        .login-header h1 {
            font-size: 1.65rem;
            line-height: 1.2;
            margin-bottom: 0.35rem;
        }
        .login-header p {
            font-size: 0.9rem;
            opacity: 0.8;
            font-weight: 400;
        }
        .login-card {
            background: white;
            padding: 2.5rem 2.5rem 2rem;
            border-radius: 0 0 18px 18px;
            box-shadow: var(--card-shadow);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--ink-navy);
            margin-bottom: 0.45rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #dde1e7;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif;
            color: var(--ink-navy);
            background: var(--pearl);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 3px rgba(11, 127, 143, 0.12);
            background: white;
        }
        .btn-login {
            width: 100%;
            padding: 0.85rem 1.5rem;
            background: linear-gradient(135deg, var(--accent-teal) 0%, #096d7a 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 12px rgba(11, 127, 143, 0.25);
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(11, 127, 143, 0.35);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .error-message {
            background: rgba(192, 57, 43, 0.08);
            border: 1px solid rgba(192, 57, 43, 0.2);
            border-left: 4px solid var(--error-red);
            color: var(--error-red);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--ink-slate);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-header">
            <h1>NextGen Agents</h1>
            <p>Application Evaluation System</p>
        </div>
        <div class="login-card">
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login" autocomplete="on">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required
                           autocomplete="username" autofocus
                           placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required
                           autocomplete="current-password"
                           placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            <div class="login-footer">
                Secured with Azure Key Vault &middot; v{{ app_version | default('0.0.0') }}
            </div>
        </div>
    </div>
</body>
</html>
