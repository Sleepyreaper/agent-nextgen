name: Cleanup Sweep Branches

on:
  schedule:
    # Run every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
    - name: Delete sweep branches older than 7 days
      uses: actions/github-script@v7
      with:
        script: |
          const prefixes = ['willie/sweep-', 'bob/security-sweep-', 'smithers/ops-report-'];
          const cutoff = new Date();
          cutoff.setDate(cutoff.getDate() - 7);

          const branches = await github.paginate(github.rest.repos.listBranches, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            per_page: 100,
          });

          let deleted = 0;
          for (const branch of branches) {
            const isSweep = prefixes.some(p => branch.name.startsWith(p));
            if (!isSweep) continue;

            // Extract date from branch name (e.g. willie/sweep-2026-03-01)
            const dateMatch = branch.name.match(/(\d{4}-\d{2}-\d{2})$/);
            if (!dateMatch) continue;

            const branchDate = new Date(dateMatch[1] + 'T00:00:00Z');
            if (branchDate < cutoff) {
              console.log(`Deleting stale branch: ${branch.name} (${dateMatch[1]})`);
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch.name}`,
              });
              deleted++;
            }
          }

          console.log(`Cleanup complete: ${deleted} stale sweep branches deleted`);
