name: Deploy Agent NextGen

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'dev/**'
      - '!willie/**'
      - '!bob/**'
      - '!smithers/**'
    paths-ignore:
      - 'documents/**'
      - '*.md'
      - 'scripts/**'
      - '.github/workflows/cleanup-sweep-branches.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  # ── Deploy to STAGING (branches + PRs) ──────────────────────────
  deploy-staging:
    if: >
      (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging')
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Validate dependencies
      run: |
        pip install -r requirements.txt
        python -c "import flask; import psycopg; import openai; print('\u2705 All key imports OK')"

    - name: Stamp version
      run: |
        echo "${GITHUB_SHA::7}-staging" > VERSION

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy to Staging Slot
      run: |
        set -euo pipefail
        az webapp config access-restriction set \
          --name ${{ secrets.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --use-same-restrictions-for-scm-site false \
          --output none

        zip -r /tmp/deploy.zip . \
          -x '.git/*' '__pycache__/*' '*.pyc' 'logs/*' 'uploads/*' \
             'student_documents/*' '.github/*' '.DS_Store'

        az webapp deploy \
          --name ${{ secrets.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --slot staging \
          --src-path /tmp/deploy.zip \
          --type zip \
          --async true

        az webapp config access-restriction set \
          --name ${{ secrets.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --use-same-restrictions-for-scm-site true \
          --output none

    - name: Verify RBAC roles for staging slot
      run: |
        set -euo pipefail
        SLOT_PRINCIPAL=$(az webapp identity show \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --name ${{ secrets.AZURE_WEBAPP_NAME }} \
          --slot staging \
          --query "principalId" -o tsv)

        STORAGE_ID=$(az storage account show \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
          --query "id" -o tsv)

        # Check if Storage Blob Data Contributor is assigned
        ROLE=$(az role assignment list \
          --assignee "$SLOT_PRINCIPAL" \
          --scope "$STORAGE_ID" \
          --query "[?roleDefinitionName=='Storage Blob Data Contributor'].roleDefinitionName" \
          -o tsv)

        if [ -z "$ROLE" ]; then
          echo "⚠️ Missing Storage Blob Data Contributor — assigning now..."
          az role assignment create \
            --assignee-object-id "$SLOT_PRINCIPAL" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "$STORAGE_ID" \
            --output none
          echo "✅ Role assigned to staging identity ($SLOT_PRINCIPAL)"
        else
          echo "✅ Storage Blob Data Contributor already assigned to $SLOT_PRINCIPAL"
        fi

        echo "## 🔐 RBAC Verification" >> $GITHUB_STEP_SUMMARY
        echo "- Staging identity: \`$SLOT_PRINCIPAL\`" >> $GITHUB_STEP_SUMMARY
        echo "- Storage Blob Data Contributor: ✅" >> $GITHUB_STEP_SUMMARY

    - name: Post deployment URL
      run: |
        echo "## 🚀 Deployed to Staging" >> $GITHUB_STEP_SUMMARY
        echo "**URL:** ${{ vars.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY

  # ── Deploy to PRODUCTION (main branch) ──────────────────────────
  deploy-production:
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Validate dependencies
      run: |
        pip install -r requirements.txt
        python -c "import flask; import psycopg; import openai; print('\u2705 All key imports OK')"

    - name: Stamp version
      run: |
        echo "${GITHUB_SHA::7}" > VERSION

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy to Production
      run: |
        set -euo pipefail
        az webapp config access-restriction set \
          --name ${{ secrets.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --use-same-restrictions-for-scm-site false \
          --output none

        zip -r /tmp/deploy.zip . \
          -x '.git/*' '__pycache__/*' '*.pyc' 'logs/*' 'uploads/*' \
             'student_documents/*' '.github/*' '.DS_Store'

        az webapp deploy \
          --name ${{ secrets.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --src-path /tmp/deploy.zip \
          --type zip \
          --async true

        az webapp config access-restriction set \
          --name ${{ secrets.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --use-same-restrictions-for-scm-site true \
          --output none

    - name: Post deployment URL
      run: |
        echo "## ✅ Deployed to Production" >> $GITHUB_STEP_SUMMARY
        echo "**URL:** ${{ vars.PRODUCTION_URL }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
